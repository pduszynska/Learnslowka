}
button,input,textarea{font:inherit}
.app{max-width:1240px;margin:0 auto;padding:18px}
.hero{display:grid;gap:18px;margin-bottom:18px}

h1{margin:0;font-size:clamp(2.75rem,8vw,5rem);line-height:.9;letter-spacing:-.055em;font-weight:780}

h3{margin:0;font-size:1.05rem;font-weight:680}
p{margin:0} .sub,.muted{color:var(--muted);line-height:1.55} .small{font-size:.88rem}

.tiny{color:#99a3b4;font-size:.72rem;text-transform:uppercase;letter-spacing:.18em;font-weight:700}

.master-top,.section-head,.tile-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}

.word-name{font-weight:680;font-size:1.05rem} .translation{color:var(--muted);font-size:.86rem;margin-top:3px}

function render(){ensureProgress();save();renderStats();renderNav();renderPriority();var html="";if(mode==="dashboard")html=renderDashboard();if(mode==="library")html=renderLibrary();if(mode==="backup")html=renderBackup();if(mode==="add")html=renderAdd();if(mode==="import")html=renderImport();if(mode==="flashcards")html=renderFlashcards();if(mode==="abcd")html=renderABCD();if(mode==="memory")html=renderMemory();if(mode==="typing")html=renderTyping();if(mode==="cloze")html=renderCloze();if(mode==="collocation")html=renderCollocation();document.getElementById("main").innerHTML=html;bind()}
function bindSelects(){document.querySelectorAll("[data-select]").forEach(function(el){el.onclick=function(){selectedId=this.dataset.select;mode="library";save();render()}})}
function bind(){bindSelects();var start=document.getElementById("startDaily");if(start)start.onclick=function(){mode="flashcards";render()};var search=document.getElementById("search");if(search){search.oninput=filterLibrary;filterLibrary()};var reset=document.getElementById("resetBtn");if(reset)reset.onclick=function(){if(confirm("Reset to built-in 93 words and clear progress?")){words=clone(DEFAULT_WORDS);progress={};selectedId=words[0].id;mode="dashboard";render()}};var del=document.getElementById("deleteSelected");if(del)del.onclick=function(){if(confirm("Delete this word?")){words=words.filter(function(w){return w.id!==selectedId});delete progress[selectedId];selectedId=words[0]?words[0].id:"";render()}};var wf=document.getElementById("wordFileInput");if(wf)wf.onchange=function(){readFile(wf,function(text){importFromText(text,false,"fileImportResult")})};var bf=document.getElementById("backupFileInput");if(bf)bf.onchange=function(){readFile(bf,function(text){importFromText(text,true,"backupFileResult")})};var importBtn=document.getElementById("importBtn");if(importBtn)importBtn.onclick=function(){importFromText(document.getElementById("importBox").value,false,"importResult")};var importBackup=document.getElementById("importBackup");if(importBackup)importBackup.onclick=function(){importFromText(document.getElementById("backupImport").value,true,"backupFileResult")};var dl=document.getElementById("downloadBackup");if(dl)dl.onclick=function(){downloadFile("lexiforge_backup.json",JSON.stringify({version:"lexiforge-v4",exportedAt:new Date().toISOString(),words:words,progress:progress},null,2))};var cp=document.getElementById("copyBackup");if(cp)cp.onclick=function(){navigator.clipboard.writeText(document.getElementById("backupText").value).then(function(){alert("Copied")})};var pw=document.getElementById("promptWord"),pb=document.getElementById("promptBox");if(pw&&pb){function up(){pb.value=aiPrompt(pw.value)}pw.oninput=up;up()};var cpr=document.getElementById("copyPrompt");if(cpr)cpr.onclick=function(){navigator.clipboard.writeText(document.getElementById("promptBox").value).then(function(){alert("Prompt copied")})};var sw=document.getElementById("saveWord");if(sw)sw.onclick=function(){var w=makeWord({word:val("wWord"),translation:val("wTranslation"),definition:val("wDefinition"),example:val("wExample"),collocations:val("wCollocations"),synonyms:val("wSynonyms"),antonyms:val("wAntonyms"),tags:val("wTags"),register:val("wRegister"),nuance:val("wNuance"),sourceNotes:val("wNotes")});if(!w.word||!w.translation){alert("Add word and meaning");return}words.unshift(w);progress[w.id]=blank(4);selectedId=w.id;mode="library";render()};var reveal=document.getElementById("revealBtn");if(reveal)reveal.onclick=function(){revealed=true;render()};document.querySelectorAll("[data-grade]").forEach(function(b){b.onclick=function(){var q=Number(this.dataset.grade),w=dueWords()[qIndex%dueWords().length];record(w.id,{recognition:1,recall:1,context:q>.8?.7:.2},q);qIndex++;revealed=false;feedback=null;render()}});document.querySelectorAll("[data-abcd]").forEach(function(b){b.onclick=function(){var w=dueWords()[qIndex%dueWords().length],ok=this.dataset.abcd===w.translation;feedback={ok:ok,text:ok?"Correct translation.":"Correct answer: "+w.translation};record(w.id,{recognition:1},ok?.9:.25);render()}});var nm=document.getElementById("newMemory");if(nm)nm.onclick=function(){memoryState=null;render()};document.querySelectorAll("[data-memory]").forEach(function(b){b.onclick=function(){if(!memoryState)return;var idx=Number(this.dataset.memory);if(memoryState.matched.indexOf(idx)>=0||memoryState.flipped.indexOf(idx)>=0||memoryState.flipped.length>=2)return;memoryState.flipped.push(idx);if(memoryState.flipped.length===2){memoryState.moves++;var a=memoryState.cards[memoryState.flipped[0]],bb=memoryState.cards[memoryState.flipped[1]];if(a.id===bb.id&&a.type!==bb.type){memoryState.matched.push(memoryState.flipped[0],memoryState.flipped[1]);record(a.id,{recognition:.7,recall:.3},.8);memoryState.flipped=[];render()}else{render();setTimeout(function(){memoryState.flipped=[];render()},700);return}}render()}});var tc=document.getElementById("typingCheck");if(tc)tc.onclick=checkTyping;var ti=document.getElementById("typingInput");if(ti)ti.onkeydown=function(e){if(e.key==="Enter")checkTyping()};document.querySelectorAll("[data-cloze]").forEach(function(b){b.onclick=function(){var w=dueWords()[qIndex%dueWords().length],ok=this.dataset.cloze===w.word;feedback={ok:ok,text:ok?"Correct context.":"Better: "+w.word};record(w.id,{context:1,recall:.5},ok?.9:.2);render()}});document.querySelectorAll("[data-collocation]").forEach(function(b){b.onclick=function(){var w=dueWords()[qIndex%dueWords().length],correct=(w.collocations&&w.collocations[0])||(w.word+" example"),ok=this.dataset.collocation===correct;feedback={ok:ok,text:ok?"Natural collocation.":"Better: "+correct};record(w.id,{collocation:1,context:.5},ok?.9:.25);render()}});var nxt=document.getElementById("nextBtn");if(nxt)nxt.onclick=function(){qIndex++;feedback=null;revealed=false;render()}}
function filterLibrary(){var q=(document.getElementById("search").value||"").toLowerCase(),list=enrich().filter(function(w){return(w.word+" "+w.translation+" "+w.definition+" "+(w.tags||[]).join(" ")).toLowerCase().indexOf(q)>=0});document.getElementById("libraryList").innerHTML=list.map(function(w){return'<article class="word-tile" data-select="'+w.id+'"><div class="tile-top"><div><div class="word-name">'+esc(w.word)+'</div><div class="translation">'+esc(w.translation)+'</div></div><span class="status '+w.statusClass+'">'+w.mastery+'%</span></div></article>'}).join("");bindSelects()}
function checkTyping(){var w=dueWords()[qIndex%dueWords().length],answer=document.getElementById("typingInput").value,ok=normalise(answer)===normalise(w.word);feedback={ok:ok,text:ok?"Typed correctly.":"Answer: "+w.word};record(w.id,{recall:1,spelling:1},ok?.95:.2);render()} function val(id){var el=document.getElementById(id);return el?el.value:""}
function downloadFile(filename,text){var blob=new Blob([text],{type:"application/json"}),url=URL.createObjectURL(blob),a=document.createElement("a");a.href=url;a.download=filename;document.body.appendChild(a);a.click();setTimeout(function(){URL.revokeObjectURL(url);a.remove()},300)}
render();
})();
