function recActivity(w){let p=w.progress||{};if(w.stage==='New')return{m:'swipe',text:'Swipe Sort or A/B/C/D — first recognition'};if(['Seeded','Familiar'].includes(w.stage))return{m:(p.recall||0)<35?'reverse':'cloze',text:(p.recall||0)<35?'Reverse — connect Polish meaning to English word':'Cloze — use it in context'};if(w.stage==='Learning')return{m:(p.spelling||0)<45?'tiles':'sentence',text:(p.spelling||0)<45?'Word Tiles / Letter Game — spelling and form recall':'Sentence Order — make the word usable'};if(w.stage==='Strong')return{m:(p.recall||0)<75?'typing':'wordle',text:(p.recall||0)<75?'Easy Typing — stronger recall':'Wordle / Hard Typing — final recall check'};return{m:'cloze',text:'Spaced reminder — keep it alive'}}

function nextStageName(s){let i=STAGES.indexOf(s);return i>=0&&i<STAGES.length-2?STAGES[i+1]:(s==='Rusty'?'Strong':'Long-term')}
function goalFor(stageName){return {Seeded:{recognition:15,correct:1,modes:1},Familiar:{recognition:25,recall:10,correct:2,modes:1},Learning:{recognition:35,recall:30,context:20,correct:4,modes:2},Strong:{recognition:55,recall:50,spelling:35,context:40,correct:7,modes:3},Mastered:{recognition:70,recall:70,spelling:60,context:60,collocation:30,correct:10,modes:4},'Long-term':{recognition:80,recall:80,spelling:70,context:70,collocation:45,correct:14,modes:4}}[stageName]||{recognition:20,correct:1,modes:1}}

function forecastHtml(w){let s=coachSummary(w);let longEst=estimateFor(w,'Long-term');return `<div class="coachNote"><h3>🧠 Learning coach plan</h3><p class="muted small"><b>Next stage:</b> ${esc(s.next)} · <b>Estimate:</b> ${s.est.attempts} correct attempt(s), about ${s.est.sessions} short session(s).</p><p class="muted small" style="margin-top:6px"><b>Why:</b> ${esc(s.why)}</p><div style="margin-top:8px">${s.acts.map(a=>`<span class="needTag">${esc(a)}</span>`).join('')}</div><p class="muted small" style="margin-top:8px"><b>Long-term forecast:</b> around ${longEst.sessions} short session(s), plus spaced reviews over several days.</p></div>`}
function toast(msg,sub=''){let old=document.querySelector('.toast');if(old)old.remove();let t=document.createElement('div');t.className='toast';t.innerHTML=esc(msg)+(sub?`<small>${esc(sub)}</small>`:'');document.body.appendChild(t);setTimeout(()=>{if(t&&t.parentNode)t.remove()},3600)}
function postAnswerText(w,game,ok){let s=coachSummary(find(w.id)||w);let impact={swipe:'recognition',abcd:'recognition',reverse:'recall',cloze:'context',collocation:'collocation',tiles:'spelling',hangman:'spelling',wordle:'spelling + recall',sentence:'context',typing:'recall',hardtyping:'final recall'}[game]||'memory';if(ok)return `Correct — ${impact} improved. Next for this word: ${s.acts[0]||'spaced review'} to move toward ${s.next}.`;return `Not yet — this word will come back. Best repair: ${s.acts[0]||'A/B/C/D'} before harder recall.`}
function coach(){let list=dueWords().slice(0,20);return `<section class="card"><h2>Word Coach</h2><p class="muted small">Detailed plan for each word: what is missing, what to do next, and a rough estimate.</p><div class="grid two" style="margin-top:16px">${list.map(w=>`<div class="word-tile"><div class="tile-top"><div><b>${esc(w.word)}</b><div class="translation">${esc(w.translation)}</div></div><span class="stage ${w.stage}">${w.stage}</span></div>${forecastHtml(w)}${checklistHtml(w)}</div>`).join('')}</div></section>`}
function buildPlan(){let base=['swipe','abcd','reverse','cloze','collocation','tiles','sentence','hangman','wordle','typing'];let plan=[],last='';for(let i=0;i<10;i++){let r=recActivity(dueWords()[i%dueWords().length]).m;let candidates=[r].concat(base);let pickm=candidates.find(x=>x!==last&&!plan.slice(-1).includes(x))||base.find(x=>x!==last)||'abcd';plan.push(pickm);last=pickm}return plan}

function title(id){let m=MODES.find(x=>x[0]===id);return m?m[2]:id}function opts(correct,pool){let o=[correct],s=shuffle(pool);for(let x of s){if(o.length>=4)break;if(x&&x!==correct&&!o.includes(x))o.push(x)}return shuffle(o)}function getWordForGame(game){let map={swipe:['New','Seeded','Familiar'],abcd:['New','Seeded','Familiar'],reverse:['Seeded','Familiar','Learning'],cloze:['Familiar','Learning'],collocation:['Familiar','Learning','Strong'],tiles:['Learning','Strong'],hangman:['Familiar','Learning','Strong'],wordle:['Learning','Strong'],sentence:['Familiar','Learning','Strong'],typing:['Learning','Strong'],hardtyping:['Strong','Mastered','Long-term']};return pick(map[game]||null)}

function ensureActive(game){if(!active||active.game!==game||(!answered&&active.answered))active=makeActive(game);return active}function resetQuestion(){feedback=null;answered=false;active=null;tileState=wordleState=searchState=sentState=hangState=null}

function gameRender(a){let w=a.w,disabled=answered?'disabled':'';if(a.game==='swipe')return`<h2>Swipe Sort</h2><div class="question-card ${qcls()}"><div class="question-word">${esc(w.word)}</div><div class="big-translation" style="text-align:center">${esc(a.shown)}</div><div class="backup-row" style="justify-content:center"><button class="btn red" data-answer="left" ${disabled}>← Wrong</button><button class="btn green" data-answer="right" ${disabled}>Correct →</button></div>${fb()}</div>`;if(['abcd','reverse','cloze','collocation'].includes(a.game)){let prompt=a.game==='reverse'?`<div class="big-translation">${esc(w.translation)}</div>`:a.game==='cloze'?`<h2 style="line-height:1.2;margin-top:18px">${esc(w.cloze)}</h2>`:a.game==='collocation'?`<div class="big-translation">${esc(a.blank)}</div>`:`<div class="question-word">${esc(w.word)}</div><button class="btn light speak" data-speak="${esc(w.word)}">🔊 Listen</button>`;return`<h2>${title(a.game)}</h2><div class="question-card ${qcls()}">${prompt}<div class="options">${a.choices.map(o=>`<button class="option ${answered&&o===a.chosen?(feedback.ok?'chosen correct':'chosen wrong'):''}" data-answer="${esc(o)}" ${disabled}>${esc(o)}</button>`).join('')}</div>${fb()}${a.game==='collocation'&&answered?`<div class="upload-box"><b>Other:</b> ${esc((w.collocations||[]).join(', '))}</div>`:''}</div>`}if(a.game==='tiles')return`<h2>Word Tiles</h2><div class="question-card ${qcls()}"><div class="big-translation">${esc(w.translation)}</div><p class="definition">${esc(w.definition)}</p><div class="answer-slots">${a.target.split('').map((ch,i)=>{let v=a.built[i]||(i<a.hint?ch:'');return`<div class="answer-slot ${v===ch?'good':''}">${esc((v||'').toUpperCase())}</div>`}).join('')}</div><div class="letter-row">${a.letters.map((ch,i)=>`<button class="letter-tile ${a.used[i]?'used':''}" data-letter="${i}" ${disabled}>${esc(ch.toUpperCase())}</button>`).join('')}</div><div class="backup-row" style="justify-content:center"><button class="btn light" id="backTile" ${disabled}>Backspace</button><button class="btn light" id="clearTiles" ${disabled}>Clear all</button><button class="btn light" id="hintTile" ${disabled}>Hint</button><button class="btn" id="checkTiles" ${disabled}>Check</button></div>${fb()}</div>`;if(a.game==='hangman')return`<h2>Letter Game</h2><div class="question-card ${qcls()}"><div class="big-translation">${esc(w.translation)}</div><p class="definition">${esc(w.definition)}</p><div style="text-align:center;margin:18px 0">${a.target.split('').map(ch=>`<span class="hang-slot">${a.guessed.includes(ch)?ch:''}</span>`).join('')}</div><p class="muted small">Wrong guesses: ${a.wrong} / 6</p><div class="letter-row">${'abcdefghijklmnopqrstuvwxyz'.split('').map(ch=>`<button class="letterbtn ${a.guessed.includes(ch)?'used':''}" data-guess="${ch}" ${disabled}>${ch.toUpperCase()}</button>`).join('')}</div>${fb()}</div>`;if(a.game==='wordle'){let grid='';for(let r=0;r<a.max;r++){let g=a.guesses[r]||'';grid+='<div class="wordle-row">';for(let i=0;i<a.target.length;i++){let ch=g[i]||'',cls=ch?(ch===a.target[i]?'greenCell':(a.target.includes(ch)?'yellowCell':'greyCell')):'';grid+=`<div class="wordle-cell ${cls}">${esc(ch.toUpperCase())}</div>`}grid+='</div>'}return`<h2>Wordle</h2><div class="question-card ${qcls()}"><div class="big-translation">${esc(w.translation)}</div><p class="definition">${esc(w.definition)}</p>${grid}<input id="wordleInput" value="${esc(a.current)}" maxlength="${a.target.length}" style="text-transform:uppercase" ${disabled}><div class="backup-row"><button class="btn" id="submitWordle" ${disabled}>Submit</button><button class="btn light" id="wordleHint" ${disabled}>Reveal another letter</button></div>${fb()}</div>`}if(a.game==='sentence')return`<h2>Sentence Order</h2><div class="question-card ${qcls()}"><div class="big-translation">${esc(w.word)} — ${esc(w.translation)}</div><div class="sentence-answer">${a.chosen.map((it,i)=>`<button class="word-chip" data-remove="${i}" ${disabled function analytics(){let e=enrich(),d=ds(),hist=stats.history||[],last7=hist.filter(h=>Date.now()-h.t<7*86400000),prev=hist.filter(h=>Date.now()-h.t>=7*86400000&&Date.now()-h.t<14*86400000);let acc=a=>a.length?Math.round(a.filter(x=>x.ok).length/a.length*100):0;let strong=e.filter(w=>w.progress.attemptsToStrong),mast=e.filter(w=>w.progress.attemptsToMaster);let avg=(a,fn)=>a.length?Math.round(a.reduce((s,x)=>s+fn(x),0)/a.length):0;let c=counts(),weak=e.slice().sort((a,b)=>a.mastery-b.mastery).slice(0,10);let pace=(d.attempts||0);let weeklyMaster=Math.max(1,Math.round(((d.stageUps||0)+acc(last7)/20)));return`<section class="card"><h2>Learning Analytics</h2><p class="muted small">This tells you whether the app is converting effort into memory, and what each word needs next.</p><div class="grid four" style="margin-top:16px"><div class="mini"><div class="tiny">Today attempts</div><div class="stagebig">${d.attempts||0}</div></div><div class="mini"><div class="tiny">Today accuracy</div><div class="stagebig">${d.attempts?Math.round(d.correct/d.attempts*100):0}%</div></div><div class="mini"><div class="tiny">Last 7 days accuracy</div><div class="stagebig">${acc(last7)}%</div></div><div class="mini"><div class="tiny">Previous week accuracy</div><div class="stagebig">${acc(prev)}%</div></div><div class="mini"><div class="tiny">Avg attempts to Strong</div><div class="stagebig">${avg(strong,w=>w.progress.attemptsToStrong||0)||'—'}</div></div><div class="mini"><div class="tiny">Avg attempts to Mastered</div><div class="stagebig">${avg(mast,w=>w.progress.attemptsToMaster||0)||'—'}</div></div><div class="mini"><div class="tiny">Mastered+</div><div class="stagebig">${(c.Mastered||0)+(c['Long-term']||0)}</div></div><div class="mini"><div class="tiny">Stage ups today</div><div class="stagebig">${d.stageUps||0}</div></div></div><div class="coachNote"><h3>📍 At this pace</h3><p class="muted small">If you do about ${pace||10} attempts per day, the app estimates roughly ${weeklyMaster}–${weeklyMaster+3} meaningful stage improvements this week. This gets more accurate once you have more history.</p></div><div class="grid two" style="margin-top:16px"><div class="card"><h3>Word-level prescriptions</h3>${weak.map(w=>`<div class="word-tile" style="margin-top:10px"><div class="tile-top"><div><b>${esc(w.word)}</b><div class="translation">${esc(w.translation)}</div></div><span class="stage ${w.stage}">${w.stage}</span></div>${forecastHtml(w)}<h3 style="margin-top:12px">Checklist</h3>${checklistHtml(w)}</div>`).join('')}</div><div class="card"><h3>Long-term memory forecast</h3><p class="muted small">Long-term means the word survived harder recall and spaced review. For each word, the app now estimates attempts and sessions in its coach card.</p><div class="forecast"><div class="mini"><div class="tiny">Close to Mastered</div><div class="stagebig">${e.filter(w=>w.stage==='Strong').length}</div></div><div class="mini"><div class="tiny">Needs repair</div><div class="stagebig">${e.filter(w=>w.stage==='Rusty').length}</div></div><div class="mini"><div class="tiny">Long-term words</div><div class="stagebig">${c['Long-term']||0}</div></div></div><button class="btn" data-jump="coach" style="margin-top:14px">Open Word Coach</button></div></div></section>`}
function grammar(){let levels=['A1','A2','B1','B2','C1','C2'],pool=GRAMMAR.filter(g=>g.level===grammarLevel);if(!pool.length)pool=GRAMMAR;let g=pool[qIndex%pool.length];currentAnswer=g.a;return`<section class="card"><h2>Grammar Gym</h2><p class="muted small">From beginner basics to fluent advanced grammar.</p><div class="backup-row">${levels.map(l=>`<button class="btn light" data-level="${l}">${l}</button>`).join('')}</div><div class="question-card ${qcls()}"><span class="pill">${esc(g.level)}</span><span class="pill">${esc(g.title)}</span><h2 style="margin-top:16px">${esc(g.q)}</h2><div class="options">${shuffle(g.o).map(o=>`<button class="option" data-grammar="${esc(o)}" ${answered?'disabled':''}>${esc(o)}</button>`).join('')}</div>${fb()}${answered?`<div class="upload-box">${esc(g.e)}</div>`:''}</div></section>`}
function findwords(){if(!searchState)makeSearch(1);let st=searchState,complete=st.targets.every(t=>st.foundWords.includes(t.word));return`<section class="card"><h2>Find Words</h2><p class="muted small">Found words are crossed out. Only correct found letters turn green.</p><div class="backup-row"><button class="btn light" id="searchL1">Level 1</button><button class="btn light" id="searchL2">Level 2</button><button class="btn light" id="newSearch">New grid</button><button class="btn light" id="clearSearch">Clear selection</button></div><div class="question-card ${complete?'correct':''}"><div class="grid two"><div><h3>Find:</h3>${st.targets.map(t=>`<p class="find-item ${st.foundWords.includes(t.word)?'found':''}">${esc(st.level===1?t.word:t.translation)}</p>`).join('')}</div><p class="muted small">Tap letters in order. Wrong selections will not turn green.</p></div><div class="search-grid">${st.grid.map((ch,i)=>`<button class="search-cell ${st.selected.includes(i)?'sel ':''}${st.found.includes(i)?'found':''}" data-cell="${i}">${ch}</button>`).join('')}</div>${complete?'<div class="feedback ok"><span>All words found.</span><button class="btn light" id="nextSearch">Next grid</button></div>':''}</div></section>`}
function makeSearch(level){let t=dueWords().filter(w=>norm(w.word).length<=8).slice(0,4),size=12,g=Array(size*size).fill(null);t.forEach(w=>{let s=norm(w.word).toUpperCase(),r=Math.floor(Math.random()*size),c=Math.floor(Math.random()*(size-s.length));w.cells=[];for(let i=0;i<s.length;i++){g[r*size+c+i]=s[i];w.cells.push(r*size+c+i)}});for(let i=0;i<g.length;i++)if(!g[i])g[i]=String.fromCharCode(65+Math.floor(Math.random()*26));searchState={level,targets:t,grid:g,selected:[],found:[],foundWords:[]}}
function library(){let w=find(selectedId);return`<div class="grid two"><section class="card"><h2>Library</h2><input id="search" placeholder="Search..." style="margin:12px 0"><div id="libraryList" class="list"></div></section>${profile(w)}</div>`}function edit(){let w=find(selectedId);return`<section class="card"><h2>Edit Word</h2><div class="grid two"><input id="eword" value="${esc(w.word)}"><input id="eipa" value="${esc(w.ipa)}"><input id="etrans" value="${esc(w.translation)}"><input id="etype" value="${esc(w.type)}"><textarea id="edef">${esc(w.definition)}</textarea><textarea id="eex">${esc(w.example)}</textarea><input id="ecoll" value="${esc((w.collocations||[]).join(', '))}"><input id="esyn" value="${esc((w.synonyms||[]).join(', '))}"><input id="eant" value="${esc((w.antonyms||[]).join(', '))}"><input id="etags" value="${esc((w.tags||[]).join(', '))}"></div><button class="btn" id="saveEdit" style="margin-top:12px">Save</button></section>`}
function safeImport(){return`<section class="card"><h2>Safe Import</h2><div class="grid two"><div class="upload-box"><input type="file" id="safeFile" accept=".json,application/json"><textarea id="safePaste" placeholder="Or paste JSON here" style="margin-top:10px"></textarea><button class="btn" id="previewImport" style="margin-top:10px">Preview import</button></div><div class="upload-box"><div id="importPreview" class="muted small">No preview yet.</div><select id="importAction" style="margin-top:10px"><option value="add">Add new words only</option><option value="merge">Merge/update existing, keep progress</option><option value="replace">Replace everything — dangerous</option></select><input id="replaceConfirm" placeholder="Type REPLACE only if replacing" style="margin-top:10px"><button class="btn green" id="applyImport" style="margin-top:10px">Import safely</button><button class="btn light" id="undoLastImport" style="margin-top:10px">Undo last import</button></div></div></section>`}function restore(){let r=stats.restorePoints||[];return`<section class="card"><h2>Restore Points</h2><div class="list" style="margin-top:16px">${r.length?r.map((x,i)=>`<div class="word-tile"><div class="tile-top"><div><b>${esc(x.label)}</b><p class="muted small">${new Date(x.at).toLocaleString()}</p></div><button class="btn light" data-restore="${i}">Restore</button></div></div>`).join(''):'<p class="muted">No restore points yet.</p>'}</div></section>`}
function cloud(){return`<section class="card"><h2>Cloud Sync</h2><p class="muted small">Auto-sync uploads only after about 20 local changes, not every answer.</p><div class="grid two"><div class="upload-box"><input id="syncCodeInput" value="${esc(get('syncCode')||'')}" placeholder="sync code"><button class="btn" id="saveSyncCode" style="margin-top:10px">Save code</button><p class="muted small" id="cloudMsg">${cloudStatus()}</p></div><div class="upload-box"><label><input type="checkbox" id="autoSyncToggle" ${get('autoSync')==='yes'?'checked':''} style="width:auto"> Auto-sync</label><p class="muted small">Pending cloud changes: ${stats.pendingCloudChanges||0}</p><div class="backup-row"><button class="btn green" id="smartSync">Smart Sync</button><button class="btn light" id="uploadCloud">Upload this device</button><button class="btn light" id="downloadCloud">Download from cloud</button></div><p class="muted small" id="cloudResult">Manual sync still works any time.</p></div></div></section>`}
function backup(){return`<section class="card"><h2>Backup</h2><div class="backup-row"><button class="btn" id="downloadBackup">Download backup JSON</button><button class="btn light" id="downloadApp2">Download app version</button></div><textarea readonly style="margin-top:16px">${esc(JSON.stringify({version:'lexiforge-v12.2',exportedAt:new Date().toISOString(),words,progress,stats},null,2))}</textarea></section>`}
function render(){ensureProgress();save();renderStats();renderNav();renderPriority();loadVoices();let map={dashboard,daily,analytics,coach,grammar,findwords,library,edit,import:safeImport,restore,cloud,backup};let html=map[mode]?map[mode]():renderExercise(mode,false);document.getElementById('main').innerHTML=html;bind()}
function bind(){document.querySelectorAll('[data-card]').forEach(b=>b.onclick=()=>{selectedId=b.dataset.card;mode='library';render()});document.querySelectorAll('[data-jump]').forEach(b=>b.onclick=()=>{mode=b.dataset.jump;render()});document.querySelectorAll('[data-mode]').forEach(()=>{});document.querySelectorAll('.speak').forEach(b=>b.onclick=()=>speak(b.dataset.speak));let tv=document.getElementById('testVoice');if(tv)tv.onclick=()=>speak('meticulous, anathema, serendipity');let da=document.getElementById('downloadAppBtn');if(da)da.onclick=downloadApp;let da2=document.getElementById('downloadApp2');if(da2)da2.onclick=downloadApp;let db=document.getElementById('downloadBackup');if(db)db.onclick=()=>downloadFile('lexiforge_v12_2_backup.json',JSON.stringify({version:'lexiforge-v12.2',exportedAt:new Date().toISOString(),words,progress,stats},null,2),'application/json');let dsb=document.getElementById('dailyStart');if(dsb)dsb.onclick=()=>{mode='daily';dailyState=null;resetQuestion();render()};document.querySelectorAll('[data-answer]').forEach(b=>b.onclick=()=>answer(b.dataset.answer));let next=document.getElementById('nextBtn');if(next)next.onclick=nextQuestion;bindGameControls();bindGrammar();bindFind();bindLibrary();bindImport();bindRestore();bindCloud();let ed=document.getElementById('editThis');if(ed)ed.onclick=()=>{mode='edit';render()};let se=document.getElementById('saveEdit');if(se)se.onclick=saveEdit}
function bindGameControls(){document.querySelectorAll('[data-letter]').forEach(b=>b.onclick=()=>{let i=+b.dataset.letter;if(!active.used[i]&&active.built.length<active.target.length){active.used[i]=true;active.built+=active.letters[i];render()}});let back=document.getElementById('backTile');if(back)back.onclick=()=>{let last=active.built.slice(-1);active.built=active.built.slice(0,-1);for(let i=active.letters.length-1;i>=0;i--)if(active.used[i]&&active.letters[i]===last){active.used[i]=false;break}render()};let clear=document.getElementById('clearTiles');if(clear)clear.onclick=()=>{active.used={};active.built='';render()};let hint=document.getElementById('hintTile');if(hint)hint.onclick=()=>{active.hint=Math.min(active.target.length,active.hint+1);render()};let chk=document.getElementById('checkTiles');if(chk)chk.onclick=()=>finishManual(active.built===active.target,active.built===active.target?'Word built correctly.':'Answer: '+active.target);document.querySelectorAll('[data-guess]').forEach(b=>b.onclick=()=>{if(answered)return;let ch=b.dataset.guess;if(!active.guessed.includes(ch))active.guessed.push(ch);if(!active.target.includes(ch))active.wrong++;let solved=active.target.split('').every(c=>active.guessed.includes(c)),lost=active.wrong>=6;if(solved||lost)finishManual(solved,solved?'Solved.':'Answer: '+active.target);else render()});let wi=document.getElementById('wordleInput');if(wi)wi.oninput=()=>{active.current=wi.value.toLowerCase().replace(/[^a-z]/g,'')};let sub=document.getElementById('submitWordle');if(sub)sub.onclick=()=>{let g=(document.getElementById('wordleInput').value||'').toLowerCase();if(g.length!==active.target.length)return alert('Use '+active.target.length+' letters.');active.guesses.push(g);let ok=g===active.target;if(ok||active.guesses.length>=active.max)finishManual(ok,ok?'Solved.':'Answer: '+active.target,ok?1:.4);else{feedback={ok:false,text:'Keep going.'};lastResult={ok:false};render()}};let wh=document.getElementById('wordleHint');if(wh)wh.onclick=()=>{active.current=active.target.slice(0,active.current.length+1);render()};document.querySelectorAll('[data-add]').forEach(b=>b.onclick=()=>{let it=active.bank[+b.dataset.add];if(!active.chosen.some(x=>x.i===it.i)){active.chosen.push(it);render()}});document.querySelectorAll('[data-remove]').forEach(b=>b.onclick=()=>{active.chosen.splice(+b.dataset.remove,1);render()});let cs=document.getElementById('checkSentence');if(cs)cs.onclick=()=>{let ok=active.chosen.map(x=>x.i).join(',')===active.answerSeq.map(x=>x.i).join(',');finishManual(ok,ok?'Correct sentence order.':'Correct: '+active.answerSeq.map(x=>x.t).join(' '))};let tc=document.getElementById('typingCheck');if(tc)tc.onclick=()=>finishManual(norm(document.getElementById('typingInput').value)===active.answer,norm(document.getElementById('typingInput').value)===active.answer?'Typed correctly.':'Answer: '+active.answer)}
function bindGrammar(){document.querySelectorAll('[data-grammar]').forEach(b=>b.onclick=()=>{if(answered)return;let ok=b.dataset.grammar===currentAnswer;answered=true;feedback={ok,text:ok?'Correct.':'Correct: '+currentAnswer};lastResult={ok};let d=ds();d.attempts++;if(ok)d.correct++;addXp(ok?10:2);beep(ok);flash(ok);markLocal();save();render()});document.querySelectorAll('[data-level]').forEach(b=>b.onclick=()=>{grammarLevel=b.dataset.level;set('grammarLevel',grammarLevel);qIndex=0;resetQuestion();render()})}
function bindFind(){let l1=document.getElementById('searchL1'),l2=document.getElementById('searchL2'),n=document.getElementById('newSearch'),c=document.getElementById('clearSearch'),nx=document.getElementById('nextSearch');if(l1)l1.onclick=()=>{makeSearch(1);render()};if(l2)l2.onclick=()=>{makeSearch(2);render()};if(n)n.onclick=()=>{makeSearch(searchState?searchState.level:1);render()};if(nx)nx.onclick=()=>{makeSearch(searchState.level);render()};if(c)c.onclick=()=>{searchState.selected=[];render()};document.querySelectorAll('[data-cell]').forEach(b=>b.onclick=()=>{let i=+b.dataset.cell;if(searchState.found.includes(i))return;if(!searchState.selected.includes(i))searchState.selected.push(i);let matched=false;searchState.targets.forEach(t=>{let key=t.cells.join(','),sel=searchState.selected.join(',');if(sel.endsWith(key)&&!searchState.foundWords.includes(t.word)){searchState.found=[...new Set(searchState.found.concat(t.cells))];searchState.foundWords.push(t.word);record(t.id,{recognition:.3,spelling:.2},.8,'findwords',true,{exposure:3,exposureOnly:true});matched=true}});if(matched)searchState.selected=[];render()})}
function bindLibrary(){let s=document.getElementById('search');if(s){s.oninput=()=>filterLibrary(s.value);filterLibrary('')}}function filterLibrary(q){let el=document.getElementById('libraryList');if(!el)return;el.innerHTML=enrich().filter(w=>(w.word+' '+w.translation+' '+w.definition).toLowerCase().includes((q||'').toLowerCase())).map(tile).join('');document.querySelectorAll('[data-card]').forEach(b=>b.onclick=()=>{selectedId=b.dataset.card;render()})}
function saveEdit(){let w=find(selectedId),nw=document.getElementById('eword').value.trim().toLowerCase();if(words.some(x=>x.id!==w.id&&norm(x.word)===norm(nw)))return alert('This word already exists.');createRestore('Before edit: '+w.word);Object.assign(words.find(x=>x.id===w.id),{word:nw,ipa:val('eipa'),translation:val('etrans'),type:val('etype'),definition:val('edef'),example:val('eex'),collocations:split('ecoll'),synonyms:split('esyn'),antonyms:split('eant'),tags:split('etags')});markLocal();save();scheduleAutoSync();mode='library';render()}function val(id){let el=document.getElementById(id);return el?el.value:''}function split(id){return val(id).split(',').map(x=>x.trim()).filter(Boolean)}function createRestore(label){stats.restorePoints=stats.restorePoints||[];stats.restorePoints.unshift({label,at:Date.now(),words:JSON.parse(JSON.stringify(words)),progress:JSON.parse(JSON.stringify(progress)),stats:JSON.parse(JSON.stringify(Object.assign({},stats,{restorePoints:[]})))});stats.restorePoints=stats.restorePoints.slice(0,8);save()}
function bindImport(){let p=document.getElementById('previewImport');if(p)p.onclick=()=>{let f=document.getElementById('safeFile').files[0],txt=val('safePaste');if(f){let r=new FileReader();r.onload=e=>previewImport(String(e.target.result||''));r.readAsText(f)}else previewImport(txt)};let a=document.getElementById('applyImport');if(a)a.onclick=applyImport;let u=document.getElementById('undoLastImport');if(u)u.onclick=()=>restoreIndex(0)}function parseImport(txt){let p=JSON.parse(txt);if(Array.isArray(p))return p;if(p&&Array.isArray(p.words))return p.words;if(p&&p.word)return[p];throw Error('Unsupported JSON')}function makeWord(r={}){let word=String(r.word||'').toLowerCase(),ex=r.example||'';return{id:r.id||('w_'+norm(word)+'_'+Date.now()),word,ipa:r.ipa||'',type:r.type||'word',translation:r.translation||r.definition||'',definition:r.definition||r.translation||'',example:ex,cloze:r.cloze||(ex?String(ex).replace(new RegExp(word,'i'),'___'):'Use ___ in a sentence.'),collocations:Array.isArray(r.collocations)?r.collocations:[],synonyms:Array.isArray(r.synonyms)?r.synonyms:[],antonyms:Array.isArray(r.antonyms)?r.antonyms:[],distractors:Array.isArray(r.distractors)?r.distractors:['ordinary','unclear','careless','simple'],tags:Array.isArray(r.tags)?r.tags:['advanced'],register:r.register||'advanced',sourceNotes:Array.isArray(r.sourceNotes)?r.sourceNotes:[],nuance:r.nuance||''}}
function previewImport(txt){try{pendingImport=parseImport(txt).map(makeWord);let keys={};words.forEach(w=>keys[norm(w.word)]=1);let n=0,d=0,i=0;pendingImport.forEach(w=>{if(!w.word||!w.translation)i++;else if(keys[norm(w.word)])d++;else n++});document.getElementById('importPreview').innerHTML=`<p><b>${n}</b> new words</p><p><b>${d}</b> duplicates/existing</p><p><b>${i}</b> invalid cards</p><p>Current: ${words.length}</p><p>After safe add: ${words.length+n}</p>`}catch(e){document.getElementById('importPreview').textContent='Invalid JSON: '+e.message}}function applyImport(){if(!pendingImport)return alert('Preview first.');let action=val('importAction');if(action==='replace'&&val('replaceConfirm')!=='REPLACE')return alert('Type REPLACE');createRestore('Before import');let existing={};words.forEach(w=>existing[norm(w.word)]=w);if(action==='replace'){words=pendingImport;progress={}}else pendingImport.forEach(w=>{let k=norm(w.word);if(!k)return;if(existing[k]&&action==='merge'){w.id=existing[k].id;Object.assign(existing[k],w)}else if(!existing[k]){words.unshift(w);existing[k]=w}});ensureProgress();markLocal();save();scheduleAutoSync();mode='dashboard';render()}
function bindRestore(){document.querySelectorAll('[data-restore]').forEach(b=>b.onclick=()=>restoreIndex(+b.dataset.restore))}function restoreIndex(i){let r=(stats.restorePoints||[])[i];if(!r)return alert('No restore point.');words=r.words;progress=r.progress;let keep=stats.restorePoints;stats=r.stats||{daily:{}};stats.restorePoints=keep;markLocal();ensureProgress();save();mode='dashboard';render()}
function cloudStatus(){if(!cloudReady)return'Firebase not loaded. Open via GitHub Pages with internet.';if(!get('syncCode'))return'Enter sync code first.';return'Ready.'}function cloudDoc(){return cloudReady&&get('syncCode')?cloudDb.collection('lexiforgeSync').doc(get('syncCode').trim()):null}function cloudPayload(){return{version:'lexiforge-v12.2',updatedAt:Date.now(),words,progress,stats}}function scheduleAutoSync(){if(get('autoSync')!=='yes'||!cloudDoc())return;if((stats.pendingCloudChanges||0)<20)return;if(cloudTimer)clearTimeout(cloudTimer);cloudTimer=setTimeout(()=>uploadCloud(false),5000)}function bindCloud(){let s=document.getElementById('saveSyncCode');if(s)s.onclick=()=>{set('syncCode',val('syncCodeInput'));document.getElementById('cloudMsg').textContent=cloudStatus()};let a=document.getElementById('autoSyncToggle');if(a)a.onchange=()=>set('autoSync',a.checked?'yes':'no');let up=document.getElementById('uploadCloud');if(up)up.onclick=()=>safeUpload(true);let down=document.getElementById('downloadCloud');if(down)down.onclick=()=>downloadCloud(true);let sm=document.getElementById('smartSync');if(sm)sm.onclick=smartSync}function setCloudMsg(s){let e=document.getElementById('cloudResult')||document.getElementById('cloudMsg');if(e)e.textContent=s}function safeUpload(show){let d=cloudDoc();if(!d)return setCloudMsg(cloudStatus());d.get().then(snap=>{if(snap.exists){let cw=(snap.data().words||[]).length;if(cw>words.length&&!confirm('Cloud has '+cw+' words. This device has '+words.length+'. Upload anyway?'))return}createRestore('Before cloud upload');uploadCloud(show)})}function uploadCloud(show){let d=cloudDoc();if(!d)return;return d.set(cloudPayload()).then(()=>{stats.cloudLastSyncedAt=Date.now();stats.pendingCloudChanges=0;save();if(show)setCloudMsg('Uploaded this device.')}).catch(e=>setCloudMsg('Upload failed: '+e.message))}function downloadCloud(show){let d=cloudDoc();if(!d)return setCloudMsg(cloudStatus());d.get().then(s=>{if(!s.exists)return setCloudMsg('Nothing in cloud yet.');createRestore('Before cloud download');let x=s.data();words=(x.words||[]).map(makeWord);progress=x.progress||{};stats=x.stats||stats;ensureProgress();stats.pendingCloudChanges=0;save();if(show)setCloudMsg('Downloaded cloud data.');mode='dashboard';render()}).catch(e=>setCloudMsg('Download failed: '+e.message))}function smartSync(){let d=cloudDoc();if(!d)return setCloudMsg(cloudStatus());d.get().then(s=>{if(!s.exists)return uploadCloud(true);let x=s.data(),ct=x.updatedAt||0,lt=stats.localUpdatedAt||0;if(ct>lt)downloadCloud(true);else safeUpload(true)})}
function loadVoices(){let sel=document.getElementById('voiceSelect');if(!sel||!('speechSynthesis'in window))return;voices=speechSynthesis.getVoices()||[];let en=voices.filter(v=>/^en/i.test(v.lang));if(!en.length)en=voices;sel.innerHTML=en.map(v=>`<option value="${esc(v.name)}">${esc(v.name+' ('+v.lang+')')}</option>`).join('')}function speak(text){if(!('speechSynthesis'in window))return alert('Speech not supported');loadVoices();let u=new SpeechSynthesisUtterance(text);let sel=document.getElementById('voiceSelect'),rate=document.getElementById('voiceRate');voices.forEach(v=>{if(sel&&v.name===sel.value)u.voice=v});u.lang=u.voice?u.voice.lang:'en-GB';u.rate=Number(rate&&rate.value?rate.value:.9);speechSynthesis.cancel();speechSynthesis.speak(u)}function downloadFile(name,text,type){let blob=new Blob([text],{type:type||'text/plain'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download=name;document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(url);a.remove()},300)}function downloadApp(){downloadFile('lexiforge_v12_2_app.html','<!doctype html>\n'+document.documentElement.outerHTML,'text/html')}if('speechSynthesis'in window)speechSynthesis.onvoiceschanged=loadVoices;render();
})();
